syntax = "proto3";

package channel;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/channel/proto";

service ChannelService {
    rpc Send(SendRequest)                    returns (SendResponse);
    rpc Receive(ReceiveRequest)              returns (stream MessageEvent);
}

message SendRequest {
    string                 channel_id = 1;
    string                 content    = 2;
    google.protobuf.Struct metadata   = 3;
}

message SendResponse {
    string message_id = 1;
}

message ReceiveRequest {
    string channel_id = 1;
}

message MessageEvent {
    string                 id         = 1;
    string                 channel_id = 2;
    string                 author_id  = 3;
    string                 content    = 4;
    google.protobuf.Struct metadata   = 5;
}
