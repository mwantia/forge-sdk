syntax = "proto3";

package sessions;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/sessions/proto";

// SessionsService carries session + message lifecycle for plugins that
// own their own storage (e.g. OpenViking). Sessions and messages are a
// single feature: a plugin either supports both or neither.
service SessionsService {
    rpc CreateSession(CreateSessionRequest) returns (SessionProto);
    rpc GetSession(GetSessionRequest)       returns (SessionProto);
    rpc ListSessions(ListSessionsRequest)   returns (ListSessionsResponse);
    rpc DeleteSession(DeleteSessionRequest) returns (BoolResponse);
    rpc CommitSession(CommitSessionRequest) returns (BoolResponse);

    rpc AddMessage(AddMessageRequest)           returns (BoolResponse);
    rpc GetMessage(GetMessageRequest)           returns (MessageProto);
    rpc ListMessages(ListMessagesRequest)       returns (ListMessagesResponse);
    rpc CountMessages(CountMessagesRequest)     returns (CountResponse);
    rpc CompactMessages(CompactMessagesRequest) returns (CompactResponse);
}

message SessionProto {
    string                 id            = 1;
    string                 author        = 2;
    bool                   committed     = 3;
    bool                   archived      = 4;
    int32                  message_count = 5;
    google.protobuf.Struct metadata      = 6;
}

message MessageProto {
    string                 id                   = 1;
    string                 session_id           = 2;
    string                 role                 = 3;
    string                 content              = 4;
    repeated ToolCallProto tool_calls           = 5;
    int64                  created_at_unix_nano = 6;
}

message ToolCallProto {
    string                 id        = 1;
    string                 name      = 2;
    google.protobuf.Struct arguments = 3;
    string                 result    = 4;
    bool                   is_error  = 5;
}

message CreateSessionRequest {
    string                 author   = 1;
    google.protobuf.Struct metadata = 2;
}

message GetSessionRequest {
    string session_id = 1;
}

message ListSessionsRequest {
    int32 offset = 1;
    int32 limit  = 2;
}

message ListSessionsResponse {
    repeated SessionProto sessions = 1;
}

message DeleteSessionRequest {
    string session_id = 1;
}

message CommitSessionRequest {
    string session_id = 1;
}

message AddMessageRequest {
    string       session_id = 1;
    MessageProto message    = 2;
}

message GetMessageRequest {
    string session_id = 1;
    string message_id = 2;
}

message ListMessagesRequest {
    string session_id = 1;
    int32  offset     = 2;
    int32  limit      = 3;
}

message ListMessagesResponse {
    repeated MessageProto messages = 1;
}

message CountMessagesRequest {
    string session_id = 1;
}

message CompactMessagesRequest {
    string session_id = 1;
}

message BoolResponse {
    bool ok = 1;
}

message CountResponse {
    int32 count = 1;
}

message CompactResponse {
    int32 removed = 1;
}
