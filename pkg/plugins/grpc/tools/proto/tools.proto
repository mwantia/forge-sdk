syntax = "proto3";

package tools;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/tools/proto";

service ToolsService {
    rpc ListTools(ListToolsRequest)   returns (ListToolsResponse);
    rpc GetTool(GetToolRequest)       returns (GetToolResponse);
    rpc Execute(ExecuteRequest)       returns (ExecuteResponse);
    rpc ExecuteStream(ExecuteRequest) returns (stream ExecuteChunk);
    rpc Cancel(CancelRequest)         returns (CancelResponse);
    rpc Validate(ValidateRequest)     returns (ValidateResponse);
}

// --- List ---

message ListToolsRequest {
    repeated string tags       = 1; // filter by tag
    bool            deprecated = 2; // include deprecated tools
    string          prefix     = 3; // name prefix filter
}

message ListToolsResponse {
    repeated ToolDefinitionProto tools = 1;
}

// --- GetTool ---

message GetToolRequest  { string       name = 1; }
message GetToolResponse { ToolDefinitionProto tool = 1; }

// --- Tool definition ---

message ToolPropertyProto {
    string          type        = 1;
    string          description = 2;
    repeated string enum        = 3;
    string          format      = 4;
}

message ToolParametersProto {
    map<string, ToolPropertyProto> properties = 1;
    repeated string                required   = 2;
}

message ToolAnnotations {
    bool   read_only             = 1; // produces no side-effects
    bool   destructive           = 2; // cannot be undone
    bool   idempotent            = 3; // safe to retry
    bool   requires_confirmation = 4; // agent should ask before calling
    string cost_hint             = 5; // "free" | "cheap" | "expensive"
}

message ToolDefinitionProto {
    string              name                = 1;
    string              description         = 2;
    ToolParametersProto parameters          = 3;
    repeated string     tags                = 4;
    ToolAnnotations     annotations         = 5;
    string              version             = 6;
    bool                deprecated          = 7;
    string              deprecation_message = 8;
}

// --- Execute ---

message ExecuteRequest {
    string                 tool      = 1;
    google.protobuf.Struct arguments = 2;
    string                 call_id   = 3;
}

message ExecuteResponse {
    google.protobuf.Value  result   = 1;
    bool                   is_error = 2;
    google.protobuf.Struct metadata = 3;
}

// --- ExecuteStream ---

message ExecuteChunk {
    string                call_id  = 1;
    google.protobuf.Value delta    = 2; // partial result
    bool                  done     = 3;
    bool                  is_error = 4;
}

// --- Cancel ---

message CancelRequest  { string call_id = 1; }
message CancelResponse { bool   ok      = 1; }

// --- Validate ---

message ValidateRequest {
    string                 tool      = 1;
    google.protobuf.Struct arguments = 2;
}

message ValidateResponse {
    bool             valid  = 1;
    repeated string  errors = 2;
}
