syntax = "proto3";

package resource;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/resource/proto";

// ResourceService carries path-based resource storage and retrieval.
service ResourceService {
    rpc Store(StoreRequest)   returns (StoreResponse);
    rpc Recall(RecallRequest) returns (RecallResponse);
    rpc Forget(ForgetRequest) returns (ForgetResponse);
}

message FilterPredicate {
    string               key   = 1;
    string               op    = 2; // eq | prefix | contains | gte | lte
    google.protobuf.Value value = 3;
}

message RecallQuery {
    string                    path           = 1;
    string                    query          = 2;
    repeated string           tags           = 3;
    repeated FilterPredicate  filter         = 4;
    google.protobuf.Timestamp created_after  = 5;
    google.protobuf.Timestamp created_before = 6;
    int32                     limit          = 7;
}

message StoreRequest {
    string                 path     = 1;
    string                 content  = 2;
    repeated string        tags     = 3;
    google.protobuf.Struct metadata = 4;
}

message StoreResponse {
    Resource resource = 1;
}

message RecallRequest {
    RecallQuery query = 1;
}

message RecallResponse {
    repeated Resource results = 1;
}

message ForgetRequest {
    string path = 1;
    string id   = 2;
}

message ForgetResponse {}

message Resource {
    string                    id         = 1;
    string                    path       = 2;
    string                    content    = 3;
    repeated string           tags       = 4;
    google.protobuf.Struct    metadata   = 5;
    double                    score      = 6;
    google.protobuf.Timestamp created_at = 7;
}
