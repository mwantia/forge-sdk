syntax = "proto3";

package provider;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/provider/proto";

service ProviderService {
    rpc Chat(ChatRequest)                    returns (stream ChatChunk);
    rpc Embed(EmbedRequest)                  returns (EmbedResponse);
    rpc ListModels(ListModelsRequest)        returns (ListModelsResponse);
    rpc CreateModel(CreateModelRequest)      returns (CreateModelResponse);
    rpc GetModel(GetModelRequest)            returns (GetModelResponse);
    rpc DeleteModel(DeleteModelRequest)      returns (DeleteModelResponse);
}

// --- Chat ---

message ChatRequest {
    string                model       = 1;
    repeated MessageProto messages    = 2;
    double                temperature = 3;
    int32                 max_tokens  = 4;
    repeated ToolDefProto tools       = 5;
    map<string, string>   metadata    = 6;
}

message TokenUsageProto {
    int32  input_tokens  = 1;
    int32  output_tokens = 2;
    int32  total_tokens  = 3;
    double input_cost    = 4;
    double output_cost   = 5;
    double total_cost    = 6;
}

message ChatChunk {
    string                   id         = 1;
    string                   role       = 2;
    string                   delta      = 3;
    bool                     done       = 4;
    repeated ToolCallProto   tool_calls = 5;
    string                   model      = 6;
    TokenUsageProto          usage      = 7;
}

message MessageProto {
    string                 role       = 1;
    string                 content    = 2;
    repeated ToolCallProto tool_calls = 3;
}

message ToolDefProto {
    string                 name        = 1;
    string                 description = 2;
    google.protobuf.Struct parameters  = 3;
}

message ToolCallProto {
    string                 id        = 1;
    string                 name      = 2;
    google.protobuf.Struct arguments = 3;
}

// --- Embed ---

message EmbedRequest {
    string model   = 1;
    string content = 2;
}

message EmbedResponse {
    repeated EmbeddingProto embeddings = 1;
}

message EmbeddingProto {
    repeated float values = 1;
}

// --- Models ---

message ListModelsRequest {}

message ListModelsResponse {
    repeated ModelProto models = 1;
}

message CreateModelRequest {
    string              name            = 1;
    string              base_model      = 2;
    string              prompt_template = 3;
    string              system          = 4;
    map<string, string> parameters      = 5;
}

message CreateModelResponse {
    ModelProto model = 1;
}

message GetModelRequest {
    string name = 1;
}

message GetModelResponse {
    ModelProto model = 1;
}

message DeleteModelRequest {
    string name = 1;
}

message DeleteModelResponse {
    bool success = 1;
}

message ModelProto {
    string              name      = 1;
    int32               dimension = 2;
    map<string, string> metadata  = 3;
}
