syntax = "proto3";

package driver;

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/driver/proto";

// PluginInfo describes plugin metadata at the driver level.
message PluginInfo {
    string name    = 1;
    string author  = 2;
    string version = 3;
}

// DriverCapabilities describes what a driver supports.
message DriverCapabilities {
    repeated string      types    = 1;
    ProviderCapabilities provider = 2;
    ResourceCapabilities resource = 3;
    ChannelCapabilities  channel  = 4;
    ToolsCapabilities    tools    = 5;
    SandboxCapabilities  sandbox  = 6;
}

message ProviderCapabilities {
    bool supports_streaming = 1;
    bool supports_vision    = 2;
}

message ResourceCapabilities {
    bool  supports_vector_search = 1;
    int32 max_context_size       = 2;
}

message ChannelCapabilities {
    bool supports_direct_messages = 1;
    bool supports_threads         = 2;
}

message ToolsCapabilities {
    bool supports_async_execution = 1;
}

message SandboxCapabilities {
    string isolation_mode        = 1;
    bool   supports_streaming    = 2;
    bool   supports_filesystem   = 3;
}
