syntax = "proto3";

package memory;

option go_package = "github.com/mwantia/forge-sdk/pkg/plugins/grpc/memory/proto";

service MemoryService {
    rpc Store(StoreRequest)       returns (StoreResponse);
    rpc Retrieve(RetrieveRequest) returns (RetrieveResponse);
}

message StoreRequest {
    string              content   = 1;
    map<string, string> metadata  = 2;
    string              namespace = 3;
}

message StoreResponse {
    string id = 1;
}

message RetrieveRequest {
    string              query     = 1;
    int32               limit     = 2;
    string              namespace = 3;
    map<string, string> filter    = 4;
}

message RetrieveResponse {
    repeated MemoryResultProto results = 1;
}

message MemoryResultProto {
    string              id       = 1;
    string              content  = 2;
    double              score    = 3;
    map<string, string> metadata = 4;
}
